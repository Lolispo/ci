# Canonical reusable deploy workflow for the petterbuilds.com platform.
#
# This repo (Lolispo/ci) is PUBLIC so that BOTH public and private app repos can
# call it — GitHub blocks a public repo from calling a private repo's reusable
# workflow, but public→public and private→public are both allowed. It therefore
# holds NO secrets: the RUM ids, apps bucket and CloudFront distribution are read
# from SSM at deploy time, and the AWS role ARN is supplied by the caller (so the
# account id never lives in this public source).
#
# Callers:
#   - Private apps call it indirectly via Lolispo/web-platform's passthrough
#     (which fills in role-arn), so they need no changes.
#   - Public apps call it directly and pass role-arn as a masked SECRET (so the
#     ARN / account id stays out of their public run logs), e.g.:
#       jobs:
#         deploy:
#           permissions: { id-token: write, contents: read }
#           uses: Lolispo/ci/.github/workflows/deploy-app.yml@main
#           with:
#             app-id: dominion
#           secrets:
#             role-arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
#     Apps whose deployable site lives in a subfolder pass working-directory
#     (install/build/cache are scoped there, dist-dir resolves against it), and
#     a site can opt out of RUM with inject-rum: false.
#
# Access to AWS is gated by the OIDC role's trust policy (repo:Lolispo/*), not by
# this file being private — the token's repository claim reflects the top-level
# caller (the app repo) even through the web-platform passthrough.
name: deploy-app

on:
  workflow_call:
    inputs:
      app-id:
        description: Subdomain / bucket prefix to deploy to (e.g. friend-graph)
        required: true
        type: string
      role-arn:
        description: >-
          AWS IAM role ARN to assume via OIDC, passed as a plain input. Used by
          web-platform's passthrough for private apps (whose run logs are private).
          Public callers should instead pass the `role-arn` SECRET so the ARN (and
          its account id) is masked in their public logs — the secret takes
          precedence over this input when both are set. Access is gated by the OIDC
          trust policy (repo:Lolispo/*), not by secrecy of the ARN.
        required: false
        type: string
        default: ""
      build-command:
        required: false
        type: string
        default: npm run build
      install-command:
        description: >-
          Dependency install step. Override to skip devDeps for apps whose build
          needs none (e.g. a bash-only build → `npm ci --omit=dev`).
        required: false
        type: string
        default: npm ci
      dist-dir:
        description: >-
          Build output directory to deploy, relative to working-directory
          (so a subdir app can keep the default).
        required: false
        type: string
        default: dist
      working-directory:
        description: >-
          Subdirectory to install and build in, and to resolve dist-dir
          against. Defaults to the repo root; set e.g. `site` for a repo whose
          deployable app lives in a subfolder and whose root holds an unrelated
          package tree that must not be installed in CI.
        required: false
        type: string
        default: "."
      inject-rum:
        description: >-
          Whether to inject the platform RUM analytics snippet into built HTML.
          Defaults true; set false to opt a site out of RUM.
        required: false
        type: boolean
        default: true
      node-version:
        required: false
        type: string
        default: "22"
      aws-region:
        required: false
        type: string
        default: eu-north-1
    secrets:
      role-arn:
        description: >-
          Masked alternative to the role-arn input, for public callers that don't
          want the ARN (with its account id) printed in their public run logs. If
          set, it takes precedence over the role-arn input.
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    # dist-dir is relative to working-directory; resolve it once so the RUM and
    # S3 steps (which run at the repo root) find the build output either way.
    env:
      DIST_PATH: ${{ inputs.working-directory }}/${{ inputs.dist-dir }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json
      - run: ${{ inputs.install-command }}
        working-directory: ${{ inputs.working-directory }}
      - run: ${{ inputs.build-command }}
        working-directory: ${{ inputs.working-directory }}
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          # Prefer the masked secret (public callers); fall back to the input
          # (web-platform passthrough for private apps).
          role-to-assume: ${{ secrets.role-arn || inputs.role-arn }}
          aws-region: ${{ inputs.aws-region }}
      - name: Inject RUM analytics snippet
        if: ${{ inputs.inject-rum }}
        run: |
          set -euo pipefail
          ssm() { aws ssm get-parameter --name "$1" --query Parameter.Value --output text; }
          APP_ID=$(ssm /platform/rum/app-monitor-id)
          POOL_ID=$(ssm /platform/rum/identity-pool-id)
          ROLE_ARN=$(ssm /platform/rum/guest-role-arn)
          RUM_REGION=$(ssm /platform/rum/region)
          START='<!-- petterbuilds-rum:start -->'
          END='<!-- petterbuilds-rum:end -->'
          BLOCK="$START
          <script>
          (function(n,i,v,r,s,c,u,x,z){x=window.AwsRumClient={q:[],n:n,i:i,v:v,r:r,c:c,u:u};window[n]=function(c,p){x.q.push({c:c,p:p});};z=document.createElement('script');z.async=true;z.src=s;document.head.insertBefore(z,document.getElementsByTagName('script')[0]);})('cwr','$APP_ID','1.0.0','$RUM_REGION','https://client.rum.us-east-1.amazonaws.com/3.x/cwr.js',{sessionSampleRate:1,guestRoleArn:'$ROLE_ARN',identityPoolId:'$POOL_ID',endpoint:'https://dataplane.rum.$RUM_REGION.amazonaws.com',telemetries:['errors','performance'],allowCookies:false,enableXRay:false});
          </script>
          $END"
          # awk reads BLOCK from the environment (ENVIRON["BLOCK"]), so BLOCK must be
          # an env-var PREFIX, not an `awk … BLOCK=…` arg (that sets an awk var and a
          # multi-line value errors "newline in string"). Mirrors scripts/inject-rum.sh —
          # keep the two in sync.
          find "$DIST_PATH" -type f -name '*.html' | while read -r f; do
            BLOCK="$BLOCK" awk 'BEGIN{skip=0;done=0}/petterbuilds-rum:start/{skip=1;next}/petterbuilds-rum:end/{skip=0;next}skip{next}{lines[NR]=$0}END{for(i=1;i<=NR;i++){l=lines[i];if(!done&&(l ~ /<\/head>/||l ~ /<\/body>/)){print ENVIRON["BLOCK"];done=1}print l}if(!done)print ENVIRON["BLOCK"]}' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
          done

      - name: Sync to S3 and invalidate CloudFront
        run: |
          set -euo pipefail
          BUCKET=$(aws ssm get-parameter --name /platform/apps-bucket --query Parameter.Value --output text)
          DIST=$(aws ssm get-parameter --name /platform/distribution-id --query Parameter.Value --output text)
          APP_ID='${{ inputs.app-id }}'
          # The apex (www/) prefix also holds the platform-generated apps.json
          # manifest (written by web-platform/scripts/gen-manifest.sh), which is NOT
          # part of any app's build output. Never let an apex content sync --delete
          # it, or the hub 404s its manifest until the next gen-manifest run.
          DELETE_EXCLUDE=""
          [ "$APP_ID" = "www" ] && DELETE_EXCLUDE="--exclude apps.json"
          aws s3 sync "$DIST_PATH" "s3://$BUCKET/$APP_ID/" --delete $DELETE_EXCLUDE
          aws cloudfront create-invalidation --distribution-id "$DIST" --paths "/$APP_ID/*"
